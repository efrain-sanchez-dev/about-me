<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .about-container {
      max-width: 900px;
      margin: 50px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .profile-photo img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
    }

    .about-content h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .about-content p {
      margin-bottom: 15px;
      color: #555;
      line-height: 1.5;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-badge {
      background-color: #007bff;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .about-container {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <section class="about-container">
    <div class="profile-photo">
      <img src="https://via.placeholder.com/150" alt="Profile Photo">
    </div>

    <div class="about-content">
      <h1>Lorem Ipsum</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
      </p>

      <div class="skills">
        <span class="skill-badge">Lorem</span>
        <span class="skill-badge">Ipsum</span>
        <span class="skill-badge">Dolor</span>
        <span class="skill-badge">Sit</span>
      </div>
    </div>
  </section>

</body>
</html>
